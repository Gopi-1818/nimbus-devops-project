<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nimbus Store</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    button { margin-left: 10px; }
    li { margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Nimbus Store</h1>
  <h2>Products</h2>
  <ul id="products"></ul>

  <h2>Orders</h2>
  <ul id="orders"></ul>

  <script>
    // These will change later once we're in Docker/Kubernetes -
    // for now, pointing straight at our locally running services.
    const API_SERVICE_URL = 'http://localhost:3001';
    const ORDERS_SERVICE_URL = 'http://localhost:3002';

    async function loadProducts() {
      const res = await fetch(`${API_SERVICE_URL}/products`);
      const products = await res.json();
      const list = document.getElementById('products');
      list.innerHTML = '';
      products.forEach(p => {
        const li = document.createElement('li');
        li.textContent = `${p.name} - $${p.price}`;
        const btn = document.createElement('button');
        btn.textContent = 'Order';
        btn.onclick = () => placeOrder(p.id);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    async function placeOrder(productId) {
      await fetch(`${ORDERS_SERVICE_URL}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, quantity: 1 })
      });
      loadOrders();
    }

    async function loadOrders() {
      const res = await fetch(`${ORDERS_SERVICE_URL}/orders`);
      const orders = await res.json();
      const list = document.getElementById('orders');
      list.innerHTML = '';
      orders.forEach(o => {
        const li = document.createElement('li');
        li.textContent = `#${o.id}: ${o.quantity}x ${o.productName} = $${o.totalPrice}`;
        list.appendChild(li);
      });
    }

    loadProducts();
    loadOrders();
  </script>
</body>
</html>
